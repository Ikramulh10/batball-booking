<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Badminton Booking Dashboard</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f6f9;
    max-width:1400px;
    margin:auto;
}

.header{
    background:#0b3d6d;
    color:white;
    padding:20px;
    text-align:center;
}

.topbar input{
    height:50px;
    font-size:16px;
    font-weight:normal;
    padding:10px;
}

.grid-container{
    height:75vh;
}

table{
    border-collapse:collapse;
    width:100%;
    min-width:1200px;
    background:white;
}

th,td{
    min-width:120px;
    height:70px;
    font-size:14px;
}
.time{
    position: sticky;
    left: 0;
    background: white;
    z-index: 99;
    font-weight: bold;
    font-size: 20px;
    min-width: 180px;
}

.advance{
    background:#ef4444;
    color:white;
}

.monthly-member{
    background:#22c55e;
    color:white;
}

.pending{
    background:#f59e0b;
    color:white;
}

.empty{
    cursor:pointer;
}

#bookingModal{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.5);

    justify-content:center;
    align-items:center;

    z-index:9999;
}

.modal-content{
    background:white;
    width:90%;
    max-width:500px;
    margin:80px auto;
    padding:20px;
    border-radius:10px;
}

input,select{
    width:100%;
    padding:12px;
    margin-bottom:10px;
    border-radius:8px;
    border:1px solid #ccc;
    font-size:15px;
}

button{
    padding:14px 20px;
    cursor:pointer;
    border:none;
    border-radius:8px;
    background:#0b3d6d;
    color:white;
    font-size:16px;
}
@media(max-width:768px){

    .topbar{
        flex-direction:column;
    }

    table{
        min-width:1200px;
    }

    button{
        width:100%;
    }

}
.empty:hover{
    background:#dbeafe;
}
thead th{
    position: sticky;
    top: 0;
    background: #0b3d6d;
    color: white;
    z-index: 100;
    font-size: 24px;
    height: 90px;
}

thead th:first-child{
    left: 0;
    z-index: 101;
}

.grid-container{
    padding:20px;
    overflow:auto;
    height:85vh;
}
thead th{
    position: sticky;
    top: 0;
    background: #0b3d6d;
    color: white;
    z-index: 100;
    height: 60px;
}
input[type="date"]::-webkit-calendar-picker-indicator{
    transform:scale(2);
    cursor:pointer;
}
.flatpickr-calendar{
    transform:scale(1.2);
    transform-origin:top left;
}

.flatpickr-day{
    font-size:24px;
    height:50px;
    line-height:50px;
}

.flatpickr-current-month{
    font-size:24px;
}

.flatpickr-weekday{
    font-size:18px;
}
#actionModal{
    display:none;
}

#actionModal button{
    width:100%;
    margin:10px 0;
}
</style>

</head>

<body>

<div class="header">
<h2>Bat & Ball</h2>
</div>

<div class="topbar">

<button onclick="openBulkBooking()">
Bulk Booking
</button>

<button onclick="showCart()">
🛒 Cart (<span id="cartCount">0</span>)
</button>

<input type="text" id="selectedDate">

<input
type="text"
id="searchCustomer"
placeholder="Search Customer">

</div>

<div class="grid-container">

<table id="bookingTable">

<thead>
<tr id="courtHeader">
<th>Time</th>
</tr>
</thead>

<tbody id="tableBody">
</tbody>

</table>

</div>

<div id="bookingModal">

<div class="modal-content">

<h3>Add Booking</h3>

<input id="playerName" placeholder="Customer Name">

<input id="phone" placeholder="Phone Number">

<input id="amount" type="number" placeholder="Amount">

<select id="bookingType">
<option value="advance">Advance</option>
<option value="monthly">Monthly</option>
<option value="pending">Pending</option>
</select>

<button onclick="saveBooking()">Save</button>

<button onclick="addToCart()">Add To Cart</button>

<button onclick="closeModal()">Cancel</button>
</div>
</div>

<script>
const courts = 11;
document.getElementById(
    "selectedDate"
).value =
new Date().toISOString().split("T")[0];
const times = [
"8:00-9:00 AM",
"9:00-10:00 AM",
"10:00-11:00 AM",
"11:00-12:00 PM",
"12:00-1:00 PM",
"1:00-2:00 PM",
"2:00-3:00 PM",
"3:00-4:00 PM",
"4:00-5:00 PM",
"5:00-6:00 PM",
"6:00-7:00 PM",
"7:00-8:00 PM",
"8:00-9:00 PM",
"9:00-10:00 PM",
"10:00-11:00 PM"
];

const header = document.getElementById("courtHeader");

for(let i=1;i<=courts;i++){
header.innerHTML += `<th>Court ${i}</th>`;
}

const body = document.getElementById("tableBody");

times.forEach(time=>{
let row = `<tr><td class="time">${time}</td>`;

for(let court=1;court<=courts;court++){

    row += `
    <td
    class="empty"
    data-court="${court}"
    data-time="${time}">
    </td>`;
}

row += "</tr>";

body.innerHTML += row;

});

let selectedCourt = null;
let selectedTime = null;
let selectedBookingId = null;
let currentBookingId = null;
let cart = [];

document.addEventListener("click",(e)=>{

const cell =
    e.target.closest("td");

if(!cell || !cell.dataset.court)
    return;

selectedCourt =
    cell.dataset.court;

selectedTime =
    cell.dataset.time;

const bookingId =
    cell.dataset.bookingId;

if(bookingId){

    selectedBookingId = bookingId;
    currentBookingId = bookingId;

    document.getElementById(
        "actionModal"
    ).style.display = "block";

    return;
}

document.getElementById(
    "bookingModal"
).style.display = "flex";

});

function closeModal(){

document.getElementById(
    "bookingModal"
).style.display = "none";

}
async function saveBooking(){

const booking = {

    player_name:
        document.getElementById("playerName").value,

    phone:
        document.getElementById("phone").value,

    amount:
        document.getElementById("amount").value,

    booking_type:
        document.getElementById("bookingType").value,

    booking_date:
        document.getElementById("selectedDate").value,

    court_number:
        selectedCourt,

    booking_time:
        selectedTime,

    payment_status:
        "Pending"
};
if(selectedBookingId){

    await fetch(
        `https://batball-booking.onrender.com/bookings/${selectedBookingId}`,
        {
            method:"PUT",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify(booking)
        }
    );

    selectedBookingId = null;

    location.reload();

    return;
}
try{

    await fetch(
        "https://batball-booking.onrender.com/bookings",
        {
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify(booking)
        }
    );

    closeModal();

    location.reload();

}catch(error){

    console.error(error);
    alert("Failed to save booking");

}

}

async function loadBookings(){

    const selectedDate =
        document.getElementById("selectedDate").value;
    const searchText =
(
    document.getElementById(
        "searchCustomer"
    )?.value || ""
).toLowerCase();
    const response =
        await fetch(
            "https://batball-booking.onrender.com/bookings"
        );

    const bookings =
        await response.json();

    document
        .querySelectorAll("[data-court]")
        .forEach(cell=>{

            cell.innerHTML = "";
            cell.className = "empty";

        });

    const filteredBookings =
    bookings.filter(b => {

        const dateMatch =
            b.booking_date === selectedDate;

        const nameMatch =
            (b.player_name || "")
            .toLowerCase()
            .includes(searchText);

        return dateMatch && nameMatch;

    });

    filteredBookings.forEach(b=>{

        const cell =
            document.querySelector(
                `[data-court="${b.court_number}"][data-time="${b.booking_time}"]`
            );

        if(!cell) return;

        cell.innerHTML =
`
<div style="
font-size:20px;
line-height:1.5;
padding:10px;
">
<b>${b.player_name}</b>
<br>
<span style="font-size:18px;">
${b.phone || ""}
</span>
</div>
`;
        cell.dataset.bookingId = b.id;

        if(b.booking_type==="advance"){
            cell.className="advance";
        }

        if(b.booking_type==="monthly"){
            cell.className="monthly-member";
        }

        if(b.booking_type==="pending"){
            cell.className="pending";
        }

    });
}
document
.getElementById("selectedDate")
.addEventListener(
    "change",
    loadBookings
);
document
.getElementById("searchCustomer")
.addEventListener(
    "keyup",
    loadBookings
);
async function deleteBooking(id){

console.log("Deleting booking:", id);

const response = await fetch(
    `https://batball-booking.onrender.com/bookings/${id}`,
    {
        method:"DELETE"
    }
);

const result = await response.json();

console.log(result);

location.reload();

}
async function openEditBooking(id){

    const response =
        await fetch(
            "https://batball-booking.onrender.com/bookings"
        );

    const bookings =
        await response.json();

    const booking =
        bookings.find(
            b => b.id == id
        );

    if(!booking) return;

    document.getElementById(
        "playerName"
    ).value = booking.player_name;

    document.getElementById(
        "phone"
    ).value = booking.phone;

    document.getElementById(
        "amount"
    ).value = booking.amount;

    document.getElementById(
        "bookingType"
    ).value = booking.booking_type;

    document.getElementById(
        "bookingModal"
    ).style.display = "block";

}
function closeActionModal(){

    document.getElementById(
        "actionModal"
    ).style.display = "none";

}

function editBooking(){

    closeActionModal();

    openEditBooking(currentBookingId);

}

function deleteCurrentBooking(){

    closeActionModal();

    deleteBooking(currentBookingId);

}

async function customerHistory(){

    const response =
        await fetch(
            "https://batball-booking.onrender.com/bookings"
        );

    const bookings =
        await response.json();

    const booking =
        bookings.find(
            b => b.id == currentBookingId
        );

    if(!booking) return;

    const historyResponse =
        await fetch(
            `https://batball-booking.onrender.com/customer/${booking.player_name}`
        );

    const history =
        await historyResponse.json();

    let text =
        `Customer: ${booking.player_name}\n\n`;

    text +=
        `Total Bookings: ${history.length}\n\n`;

    history.forEach(b => {

        text +=
            `${b.booking_date} | Court ${b.court_number} | ${b.booking_time}\n`;

    });

    alert(text);

}
function openBulkBooking(){

    document.getElementById(
        "bulkModal"
    ).style.display = "block";

}

function closeBulkBooking(){

    document.getElementById(
        "bulkModal"
    ).style.display = "none";

}
async function checkBulkAvailability(){

    const court =
        document.getElementById(
            "bulkCourt"
        ).value;

    const time =
        document.getElementById(
            "bulkTime"
        ).value;

    const fromDate =
    document.getElementById(
        "bulkFrom"
    ).value;

const toDate =
    document.getElementById(
        "bulkTo"
    ).value;

const selectedDays =
    Array.from(
        document.querySelectorAll(
            '#bulkModal input[type="checkbox"]:checked'
        )
    ).map(
        cb => parseInt(cb.value)
    );

const dates = [];
bulkDates = dates;
let current =
    new Date(fromDate);

const end =
    new Date(toDate);

while(current <= end){

    if(
        selectedDays.includes(
            current.getDay()
        )
    ){

        dates.push(
            current
            .toISOString()
            .split("T")[0]
        );

    }

    current.setDate(
        current.getDate() + 1
    );

}

    const response =
        await fetch(
            "https://batball-booking.onrender.com/bulk-check",
            {
                method:"POST",
                headers:{
                    "Content-Type":"application/json"
                },
                body:JSON.stringify({
                    dates,
                    court,
                    time
                })
            }
        );

    const result =
        await response.json();

    let html = "";

html += `
<h4>
Available Dates:
${result.available.length}
</h4>
`;

if(result.available.length){

    html += "<ul>";

    result.available.forEach(date=>{

        html += `<li>${date}</li>`;

    });

    html += "</ul>";

}

if(result.conflicts.length){

    html += `
    <h4>
    Conflicts:
    ${result.conflicts.length}
    </h4>
    `;

    result.conflicts.forEach(c=>{

        html += `
        <div style="
        background:#fee2e2;
        padding:10px;
        margin:5px 0;
        ">
            ${c.date}
            - Court ${c.court}
            Occupied
        </div>
        `;

    });

}

html += `
<button onclick="createBulkBookings()">
Confirm All
</button>
`;

document.getElementById(
    "bulkResult"
).innerHTML = html;

}
let bulkDates = [];
async function createBulkBookings(){

    const bookings = bulkDates.map(
        date => ({

            player_name:
                document.getElementById(
                    "bulkName"
                ).value,

            phone:
                document.getElementById(
                    "bulkPhone"
                ).value,

            court_number:
                document.getElementById(
                    "bulkCourt"
                ).value,

            booking_type:
                "advance",

            booking_date:
                date,

            booking_time:
                document.getElementById(
                    "bulkTime"
                ).value,

            amount:0,

            payment_status:
                "Pending"

        })
    );

    await fetch(
        "https://batball-booking.onrender.com/bulk-create",
        {
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                bookings
            })
        }
    );

    alert(
        bookings.length +
        " bookings created"
    );

    closeBulkBooking();

    loadBookings();

}
flatpickr("#selectedDate", {
    dateFormat: "Y-m-d",
    defaultDate: "today"
});
function addToCart(){

    cart.push({
        court: selectedCourt,
        time: selectedTime,
        date: document.getElementById("selectedDate").value,
        player: document.getElementById("playerName").value
    });

    document.getElementById(
        "cartCount"
    ).innerText = cart.length;

    alert("Added To Cart");

    closeModal();

}
function showCart(){

    if(cart.length === 0){
        alert("Cart Empty");
        return;
    }

    let text = "Cart Items\n\n";

    cart.forEach((item,index)=>{

        text +=
        `${index+1}. Court ${item.court} | ${item.time} | ${item.date}\n`;

    });

    const confirmBooking =
        confirm(
            text +
            "\n\nBook all cart items?"
        );

    if(confirmBooking){
        bookCart();
    }

}
async function bookCart(){

    for(const item of cart){

        await fetch(
            "https://batball-booking.onrender.com/bookings",
            {
                method:"POST",
                headers:{
                    "Content-Type":"application/json"
                },
                body:JSON.stringify({

                    player_name:
                        item.player,

                    phone:"",
                    amount:0,

                    booking_type:"advance",

                    booking_date:
                        item.date,

                    court_number:
                        item.court,

                    booking_time:
                        item.time,

                    payment_status:
                        "Pending"

                })
            }
        );

    }

    alert(
        cart.length +
        " bookings created"
    );

    cart = [];

    document.getElementById(
        "cartCount"
    ).innerText = 0;

    loadBookings();

}
loadBookings();
</script>
<div id="actionModal" style="
display:none;
position:fixed;
z-index:9999;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.5);
">

<div style="
background:white;
width:500px;
max-width:90%;
margin:150px auto;
padding:30px;
border-radius:15px;
text-align:center;
">

<h3 style="
font-size:32px;
margin-bottom:20px;
">
Booking Actions
</h3>
<button onclick="editBooking()">
Edit Booking
</button>

<button onclick="deleteCurrentBooking()">
Delete Booking
</button>

<button onclick="customerHistory()">
Customer History
</button>

<button onclick="closeActionModal()">
Cancel
</button>
</div>
</div>
<div id="bulkModal" style="
display:none;
position:fixed;
z-index:9999;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.5);
">

<div class="modal-content">

<h3>Bulk Booking</h3>

<input id="bulkName" placeholder="Customer Name">

<input id="bulkPhone" placeholder="Phone">

<input id="bulkCourt" type="number" placeholder="Court">

<select id="bulkTime">

<option>8:00-9:00 AM</option>
<option>9:00-10:00 AM</option>
<option>10:00-11:00 AM</option>
<option>11:00-12:00 PM</option>
<option>12:00-1:00 PM</option>
<option>1:00-2:00 PM</option>
<option>2:00-3:00 PM</option>
<option>3:00-4:00 PM</option>
<option>4:00-5:00 PM</option>
<option>5:00-6:00 PM</option>
<option>6:00-7:00 PM</option>
<option>7:00-8:00 PM</option>
<option>8:00-9:00 PM</option>
<option>9:00-10:00 PM</option>
<option>10:00-11:00 PM</option>

</select>

<label>From Date</label>
<input id="bulkFrom" type="date">

<label>To Date</label>
<input id="bulkTo" type="date">

<label>
<input type="checkbox" value="1"> Monday
</label>

<label>
<input type="checkbox" value="2"> Tuesday
</label>

<label>
<input type="checkbox" value="3"> Wednesday
</label>

<label>
<input type="checkbox" value="4"> Thursday
</label>

<label>
<input type="checkbox" value="5"> Friday
</label>

<label>
<input type="checkbox" value="6"> Saturday
</label>

<label>
<input type="checkbox" value="0"> Sunday
</label>

<br><br>

<button onclick="checkBulkAvailability()">
Check Availability
</button>

<button onclick="closeBulkBooking()">
Cancel
</button>

<div id="bulkResult"></div>

</div>

</div>
</body>
</html>
